name: Deploy to WordPress.org

on:
  release:
    types: [released]

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy plugin to WP.org
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '12.1.0'
          cache: 'npm'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: composer

      - name: Install Node dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      # The HR React admin builds on Node 24 + pnpm (the legacy Vue build above
      # runs on Node 12). Without this, dist-react is never produced and the
      # WordPress.org zip ships with no React UI.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js 24 for React build
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build HR React admin
        run: npm run build:react

      - name: Generate POT
        run: npm run makepot

      - name: Install Composer dependencies (production)
        run: composer install --no-dev --optimize-autoloader

      - name: Deploy to WordPress.org
        id: deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        with:
          generate-zip: true
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          DRY_RUN: true
          SLUG: erp
          ASSETS_DIR: .wordpress-org

      - name: Attach ZIP to GitHub release
        run: gh release upload "${{ github.ref_name }}" "${{ steps.deploy.outputs.zip-path }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
