name: E2E_API Tests

on:
    schedule:
        - cron: 0 2 * * *
    pull_request:
        branches: [develop]
        paths-ignore:
            - '**.md'
            - '**.txt'
            - 'docs/**'
            - '.github/ISSUE_TEMPLATE/**'
            - '**/*.po'
            - '**/*.pot'
            - 'languages/**'
            - '**/*.svg'
    push:
        branches: [develop]
        paths-ignore:
            - '**.md'
            - '**.txt'
            - 'docs/**'
            - '.github/ISSUE_TEMPLATE/**'
            - '**/*.po'
            - '**/*.pot'
            - 'languages/**'
            - '**/*.svg'
    workflow_dispatch:
        inputs:
            testsuite:
                description: Choose which test suite to run
                default: All
                type: choice
                options:
                    - E2E
                    - API
                    - All

concurrency:
    group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
    cancel-in-progress: true

env:
    ADMIN: admin
    ADMIN_PASSWORD: password
    HR_MANAGER: hr_manager1
    CRM_MANAGER: crm_manager1
    ACC_MANAGER: acc_manager1
    EMPLOYEE: employee1
    USER_PASSWORD: 01erp01
    BASE_URL: http://localhost:9999
    SERVER_URL: http://localhost:9999/wp-json
    CI: true
    HEADLESS: true
    NO_SETUP: false
    FORCE_COLOR: 1
    LICENSE_KEY: ${{ secrets.LICENSE_KEY }}
    ERP_PRO_EMAIL: ${{ secrets.ERP_PRO_EMAIL }}
    ERP_PRO_SUBSCRIPTION: yearly

jobs:
    # ── Build the PRIVATE erp-pro plugin. ──────────────────────────────────────
    # Gated so it SKIPS on fork PRs (no secret access — that is expected and fine).
    # On the internal repo it RUNS, and if ERP_PRO_TOKEN can't reach erp-pro it
    # FAILS LOUDLY (no masking). Downstream jobs treat skipped=lite, failed=red.
    build_pro:
        name: build erp-pro
        runs-on: ubuntu-latest
        timeout-minutes: 15
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        steps:
            - name: Checkout erp-pro (private)
              uses: actions/checkout@v4
              with:
                  repository: wp-erp/erp-pro
                  ref: develop
                  path: erp-pro
                  token: ${{ secrets.ERP_PRO_TOKEN }}

            - name: Use Node.js 20
              uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Composer install (erp-pro)
              working-directory: erp-pro
              run: composer install --no-dev -o --no-interaction || composer update --no-dev -o

            - name: Tar erp-pro
              run: tar --exclude='erp-pro/.git' --exclude='erp-pro/node_modules' -czf /tmp/erp-pro.tar.gz erp-pro

            - name: Upload erp-pro artifact
              uses: actions/upload-artifact@v4
              with:
                  name: erp-pro-build
                  path: /tmp/erp-pro.tar.gz
                  retention-days: 1
                  compression-level: 0

    # ── Sharded E2E. Runs lite always; adds pro only when build_pro SUCCEEDED. ──
    e2e_tests:
        name: e2e tests
        runs-on: ubuntu-latest
        timeout-minutes: 30
        needs: [build_pro]
        # Run for both lite (build_pro skipped on forks) and pro (build_pro success).
        # If build_pro FAILED (bad token on internal), this still runs lite — but the
        # overall workflow stays RED because build_pro is red. Nothing is hidden.
        if: always() && needs.build_pro.result != 'cancelled'
        strategy:
            fail-fast: false
            matrix:
                shardIndex: [1, 2, 3, 4]
                shardTotal: [4]
        defaults:
            run:
                working-directory: tests/pw
        steps:
            - name: Checkout wp-erp (free)
              uses: actions/checkout@v4

            - name: Download erp-pro artifact (pro runs)
              if: needs.build_pro.result == 'success'
              uses: actions/download-artifact@v4
              with:
                  name: erp-pro-build
                  path: /tmp/

            - name: Extract erp-pro
              if: needs.build_pro.result == 'success'
              working-directory: .
              run: tar -xzf /tmp/erp-pro.tar.gz

            - name: Use Node.js 20
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: tests/pw/package-lock.json

            - name: Composer install (wp-erp)
              working-directory: .
              run: composer install --no-dev -o --no-interaction || composer update --no-dev -o

            - name: Cache tests/pw node_modules
              id: pw-nm
              uses: actions/cache@v4
              with:
                  path: tests/pw/node_modules
                  key: pw-nm-${{ runner.os }}-${{ hashFiles('tests/pw/package-lock.json') }}

            - name: Install test dependencies
              if: steps.pw-nm.outputs.cache-hit != 'true'
              run: npm ci --prefer-offline --no-audit --no-fund

            - name: Cache Playwright browsers
              id: pw-browsers
              uses: actions/cache@v4
              with:
                  path: ~/.cache/ms-playwright
                  key: ${{ runner.os }}-playwright-${{ hashFiles('tests/pw/package-lock.json') }}

            - name: Install Playwright Chromium (+ OS deps)
              if: steps.pw-browsers.outputs.cache-hit != 'true'
              run: npx playwright install --with-deps chromium

            - name: Prepare .env + wp-env config (lite vs pro)
              run: |
                  cp .env.example .env
                  mkdir -p wp-data && touch wp-data/debug.log
                  if [ -d "$GITHUB_WORKSPACE/erp-pro" ]; then
                      echo "erp-pro present → PRO run"
                      echo "ERP_PRO=true" >> "$GITHUB_ENV"
                      cp .wp-env.ci.json .wp-env.override.json
                  else
                      echo "erp-pro absent → LITE run"
                      echo "ERP_PRO=false" >> "$GITHUB_ENV"
                      rm -f .wp-env.override.json
                  fi

            - name: Route Docker Hub through a mirror
              working-directory: .
              run: |
                  sudo mkdir -p /etc/docker
                  if [ -s /etc/docker/daemon.json ]; then
                      sudo jq '. + {"registry-mirrors": ["https://mirror.gcr.io"]}' /etc/docker/daemon.json | sudo tee /etc/docker/daemon.json.tmp >/dev/null
                      sudo mv /etc/docker/daemon.json.tmp /etc/docker/daemon.json
                  else
                      echo '{ "registry-mirrors": ["https://mirror.gcr.io"] }' | sudo tee /etc/docker/daemon.json >/dev/null
                  fi
                  sudo systemctl restart docker
                  for i in $(seq 1 15); do docker info >/dev/null 2>&1 && break; sleep 1; done

            - name: Start wp-env
              id: wp-env
              uses: nick-fields/retry@v3
              with:
                  timeout_minutes: 8
                  max_attempts: 3
                  retry_on: error
                  command: cd tests/pw && npm run start:env

            - name: 🧪 Run e2e tests (shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
              if: success() && (github.event_name != 'workflow_dispatch' || github.event.inputs.testsuite == 'E2E' || github.event.inputs.testsuite == 'All')
              timeout-minutes: 20
              run: npm test -- --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }} --reporter=blob

            - name: Upload blob report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: blob-report-e2e-${{ matrix.shardIndex }}
                  path: tests/pw/blob-report
                  if-no-files-found: ignore
                  retention-days: 1

    # ── REST/API suite. ────────────────────────────────────────────────────────
    api_tests:
        name: api tests
        runs-on: ubuntu-latest
        timeout-minutes: 25
        needs: [build_pro]
        if: always() && needs.build_pro.result != 'cancelled'
        defaults:
            run:
                working-directory: tests/pw
        steps:
            - name: Checkout wp-erp (free)
              uses: actions/checkout@v4

            - name: Download erp-pro artifact (pro runs)
              if: needs.build_pro.result == 'success'
              uses: actions/download-artifact@v4
              with:
                  name: erp-pro-build
                  path: /tmp/

            - name: Extract erp-pro
              if: needs.build_pro.result == 'success'
              working-directory: .
              run: tar -xzf /tmp/erp-pro.tar.gz

            - name: Use Node.js 20
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: tests/pw/package-lock.json

            - name: Composer install (wp-erp)
              working-directory: .
              run: composer install --no-dev -o --no-interaction || composer update --no-dev -o

            - name: Cache tests/pw node_modules
              id: pw-nm
              uses: actions/cache@v4
              with:
                  path: tests/pw/node_modules
                  key: pw-nm-${{ runner.os }}-${{ hashFiles('tests/pw/package-lock.json') }}

            - name: Install test dependencies
              if: steps.pw-nm.outputs.cache-hit != 'true'
              run: npm ci --prefer-offline --no-audit --no-fund

            - name: Cache Playwright browsers
              id: pw-browsers
              uses: actions/cache@v4
              with:
                  path: ~/.cache/ms-playwright
                  key: ${{ runner.os }}-playwright-${{ hashFiles('tests/pw/package-lock.json') }}

            - name: Install Playwright Chromium (+ OS deps)
              if: steps.pw-browsers.outputs.cache-hit != 'true'
              run: npx playwright install --with-deps chromium

            - name: Prepare .env + wp-env config (lite vs pro)
              run: |
                  cp .env.example .env
                  mkdir -p wp-data && touch wp-data/debug.log
                  if [ -d "$GITHUB_WORKSPACE/erp-pro" ]; then
                      echo "ERP_PRO=true" >> "$GITHUB_ENV"
                      cp .wp-env.ci.json .wp-env.override.json
                  else
                      echo "ERP_PRO=false" >> "$GITHUB_ENV"
                      rm -f .wp-env.override.json
                  fi

            - name: Route Docker Hub through a mirror
              working-directory: .
              run: |
                  sudo mkdir -p /etc/docker
                  if [ -s /etc/docker/daemon.json ]; then
                      sudo jq '. + {"registry-mirrors": ["https://mirror.gcr.io"]}' /etc/docker/daemon.json | sudo tee /etc/docker/daemon.json.tmp >/dev/null
                      sudo mv /etc/docker/daemon.json.tmp /etc/docker/daemon.json
                  else
                      echo '{ "registry-mirrors": ["https://mirror.gcr.io"] }' | sudo tee /etc/docker/daemon.json >/dev/null
                  fi
                  sudo systemctl restart docker
                  for i in $(seq 1 15); do docker info >/dev/null 2>&1 && break; sleep 1; done

            - name: Start wp-env
              id: wp-env
              uses: nick-fields/retry@v3
              with:
                  timeout_minutes: 8
                  max_attempts: 3
                  retry_on: error
                  command: cd tests/pw && npm run start:env

            - name: 🧪 Run api tests
              if: success() && (github.event_name != 'workflow_dispatch' || github.event.inputs.testsuite == 'API' || github.event.inputs.testsuite == 'All')
              timeout-minutes: 15
              run: npm run test:api -- --reporter=blob

            - name: Upload blob report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: blob-report-api
                  path: tests/pw/blob-report
                  if-no-files-found: ignore
                  retention-days: 1

    # ── Merge all shard/api blob reports into one HTML report. ─────────────────
    merge-reports:
        name: merge reports
        if: ${{ !cancelled() }}
        needs: [e2e_tests, api_tests]
        runs-on: ubuntu-latest
        timeout-minutes: 10
        defaults:
            run:
                working-directory: tests/pw
        steps:
            - name: Checkout wp-erp
              uses: actions/checkout@v4

            - name: Use Node.js 20
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: tests/pw/package-lock.json

            - name: Cache tests/pw node_modules
              id: pw-nm
              uses: actions/cache@v4
              with:
                  path: tests/pw/node_modules
                  key: pw-nm-${{ runner.os }}-${{ hashFiles('tests/pw/package-lock.json') }}

            - name: Install test dependencies
              if: steps.pw-nm.outputs.cache-hit != 'true'
              run: npm ci --prefer-offline --no-audit --no-fund

            - name: Download all blob reports
              uses: actions/download-artifact@v4
              with:
                  path: tests/pw/all-blobs
                  pattern: blob-report-*
                  merge-multiple: true

            - name: Merge into HTML report
              run: |
                  if [ -n "$(ls -A ./all-blobs 2>/dev/null)" ]; then
                      npx playwright merge-reports --reporter html ./all-blobs
                  else
                      echo "No blob reports to merge."
                  fi

            - name: Upload HTML report
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-html-report
                  path: tests/pw/playwright-report
                  if-no-files-found: ignore
                  retention-days: 14
